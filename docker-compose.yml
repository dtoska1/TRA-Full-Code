services:
  postgres:
    image: postgres:16
    container_name: tra_postgres
    environment:
      POSTGRES_DB: tra
      POSTGRES_USER: tra
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tra_password_change_me}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - tra_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tra_redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - tra_redis_data:/data

  meili:
    image: getmeili/meilisearch:v1.7
    container_name: tra_meili
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-change_me_master_key}
    ports:
      - "127.0.0.1:7700:7700"
    volumes:
      - tra_meili_data:/meili_data

volumes:
  tra_pg_data:
  tra_redis_data:
  tra_meili_data:
